upstream crm-frontend {
    server crm-frontend:80;
}

upstream krakend {
    server krakend:8080;
}

upstream keycloak {
    server keycloak:8080;
}

# Handle WebSocket upgrade cleanly: default to upgrade when requested, close otherwise.
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name localhost;

    # Frontend app entry point. Unknown client-side routes are handled by Angular fallback below.
    location / {
    proxy_pass http://crm-frontend;
    include /etc/nginx/conf.d/proxy-common-headers.conf;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_intercept_errors on;
    error_page 404 = @angular_spa_fallback;
    }

    # Angular router fallback: serve index.html for client-side routes.
    location @angular_spa_fallback {
        # Keep real static file 404s (e.g. .js, .css, .png) instead of returning index.html.
        if ($request_uri ~* "\.[A-Za-z0-9]{2,8}($|\?)") {
            return 404;
        }

        # Internally rewrite to index and proxy to frontend container.
        rewrite ^ /index.html break;
        proxy_pass http://crm-frontend;
        include /etc/nginx/conf.d/proxy-common-headers.conf;
    }

    # Normalize /api to /api/ so relative upstream paths are preserved.
    location = /api {
        return 301 /api/;
    }

    # API gateway routing (KrakenD) for backend endpoints.
    location /api/ {
        proxy_pass http://krakend/;
        include /etc/nginx/conf.d/proxy-common-headers.conf;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /api;
    }

    # Normalize /keycloak to /keycloak/ for consistent IAM routing.
    location = /keycloak {
        return 301 /keycloak/;
    }

    # Identity provider routing (Keycloak) for auth/admin endpoints.
    location /keycloak/ {
        proxy_pass http://keycloak;
        include /etc/nginx/conf.d/proxy-common-headers.conf;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Forwarded "host=$host:$server_port;proto=$scheme";
    }
}
